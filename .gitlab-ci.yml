image: python:3.11-alpine

before_script:
  # Update and install system dependencies for R and tools for Python
  - apt-get update && apt-get install -y r-base
  # Install Python dependencies, including rpy2
  - pip install rpy2
  # Optional: Install additional R packages if required by your Python program
  - R -e "install.packages(c('desc', 'utils'), repos='http://cran.rstudio.com/')"


stages:
  - main_task
  - publish
  
run_metadata_import:
  stage: main_task
  script:
    - pip install -r ./requirements.txt
    - echo "⚙️ Running main task"
    - python3 ./main.py -l DEBUG
    - |
      echo -e "\n\
      ✨ Execution finished"
  artifacts:
    expire_in: 4 weeks
  cache:
    paths:
      - .pip_cache/
    key: "${CI_COMMIT_REF_SLUG}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  timeout: 4h

build_and_push:
  image: docker:latest
  stage: publish
  services:
    - docker:dind
  only:
    - tags
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker build -t "$DOCKERHUB_USERNAME/opeb_tools_importer:$CI_COMMIT_TAG" -f Dockerfile .
    - docker push "$DOCKERHUB_USERNAME/opeb_tools_importer:$CI_COMMIT_TAG"
  after_script:
    - docker logout